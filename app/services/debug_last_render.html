<html lang="en">
<head>

/* Color Theme: Royal Midnight Navy, Ivory White, Classic Charcoal, Gold accents */
:root {
    --bg-color: #F5F1E8;
    --paper-color: #F5F1E8;
    --text-color: #000000;
    --accent-color: #0a192f; /* Deep Navy */
    --gold-color: #b38f32;
    --border-color: #333333;
    --column-gap: 24px;
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Old Standard TT', 'Noto Serif Telugu', 'Noto Serif Telugu', 'Noto Sans Telugu', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', serif;
    margin: 0;
    padding: 30px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

/* Multilingual Font Families */
html[lang="hi"] body, html[lang="hi"] .paragraph, html[lang="hi"] .headline {
    font-family: 'Noto Serif Devanagari', serif;
}
html[lang="te"] body, html[lang="te"] .paragraph, html[lang="te"] .headline {
    font-family: 'Noto Serif Telugu', serif;
}
html[lang="kn"] body, html[lang="kn"] .paragraph, html[lang="kn"] .headline {
    font-family: 'Noto Serif Kannada', serif;
}
html[lang="ta"] body, html[lang="ta"] .paragraph, html[lang="ta"] .headline {
    font-family: 'Noto Serif Tamil', serif;
}
html[lang="ml"] body, html[lang="ml"] .paragraph, html[lang="ml"] .headline {
    font-family: 'Noto Serif Malayalam', serif;
}

.newspaper-container {
    width: 1060px; /* Precise broadsheet width */
    height: auto;
    min-height: 500px;
    background: var(--paper-color);
    border: 2px solid var(--border-color);
    box-shadow: 0 10px 30px rgba(10, 25, 47, 0.04);
    padding: 35px 35px 15px 35px;
    box-sizing: border-box;
    position: relative;
    display: flex;
    flex-direction: column;
}

/* HEADER SECTION */
.header-section {
    width: 100%;
    margin-bottom: 10px;
    text-align: center;
}

.logo-container {
    width: 100%;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo-container svg,
.logo-container img {
    max-height: 80px;
    width: auto;
    max-width: 100%;
    display: block;
    margin: 0 auto;
}

/* NEWSPAPER META SECTION */
.meta-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1.5px solid var(--border-color);
    border-bottom: 1.5px solid var(--border-color);
    padding: 6px 12px;
    font-size: 12.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 8px;
    font-family: 'Cinzel', 'Noto Serif Telugu', 'Noto Serif Telugu', 'Noto Sans Telugu', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', serif;
    color: var(--accent-color);
}

.meta-item {
    display: flex;
    align-items: center;
}

/* HEADLINE SECTION */
.headline-section {
    margin: 25px 0 16px 0;
    text-align: center;
}

.headline {
    font-family: 'Playfair Display', 'Noto Serif Telugu', 'Noto Serif Telugu', 'Noto Sans Telugu', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', serif;
    font-size: 50px;
    font-weight: 900;
    line-height: 1.15;
    color: #111111;
    margin: 0 0 10px 0;
    letter-spacing: -1px;
}

/* SUBHEADLINE SECTION */
.subheadline-section {
    border-bottom: 0.5px solid #cbd5e1;
    padding-bottom: 15px;
    margin-bottom: 20px;
    text-align: center;
}

.subheadline {
    font-family: 'Old Standard TT', 'Noto Serif Telugu', 'Noto Serif Telugu', 'Noto Sans Telugu', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', serif;
    font-size: 19px;
    font-style: italic;
    color: #475569;
    margin: 0;
    line-height: 1.45;
}

/* CONTENT CONTAINER */
.newspaper-body {
    display: flex;
    flex-direction: column;
    gap: 20px;
    flex-grow: 1; /* Make the body grow to push footer to the bottom */
}

/* IMAGE SECTION */
.image-section {
    width: 100%;
    margin-bottom: 10px;
    border: 1px solid #cbd5e1;
    padding: 6px;
    box-sizing: border-box;
}

.article-image {
    display: block;
    margin: 0 auto;
    width: 100%;
    max-height: 450px;
    object-fit: contain;
    filter: sepia(30%) grayscale(20%) contrast(102%);
}

.image-caption {
    font-size: 13px;
    font-style: italic;
    margin-top: 8px;
    color: #475569;
    text-align: center;
    line-height: 1.4;
}

/* ARTICLE CONTENT SECTION - MULTI-COLUMN */
.article-content {
    columns: 3;
    column-gap: var(--column-gap);
    column-rule: 0.5px solid #cbd5e1;
    text-align: justify;
    font-size: 15px;
    line-height: 1.6;
    color: #1e293b;
}

.paragraph {
    margin-top: 0;
    margin-bottom: 15px;
    text-indent: 18px;
}

.paragraph:first-of-type {
    text-indent: 0;
}


.byline-section {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 12px;
    color: var(--accent-color);
    border-bottom: 0.5px solid #cbd5e1;
    padding-bottom: 4px;
    font-family: 'Cinzel', 'Noto Serif Telugu', 'Noto Serif Telugu', 'Noto Sans Telugu', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', serif;
}

/* FOOTER SECTION */
.footer-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    word-wrap: break-word;
    border-top: 1.5px solid var(--border-color);
    padding-top: 10px;
    margin-top: auto; /* Push the footer to the bottom of the container */
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #64748b;
    font-family: 'Cinzel', 'Noto Serif Telugu', 'Noto Serif Telugu', 'Noto Sans Telugu', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', serif;
    font-weight: 600;
}

                    });
                    
                    if (urls.length > 1) {
                        const aspect1 = aspectRatios[1] || 1.0;
                        let w1 = W_canvas * 0.30;
                        let h1 = w1 / aspect1;
                        h1 = Math.min(h1, imgHeightPx * 0.75);
                        let y1 = h0 + 60; // Spacing below Hero
                        obstacles.push({
                            url: urls[1],
                            caption: captions[1] || '',
                            x: 0, // Middle-left
                            y: Math.round(y1),
                            w: Math.round(w1),
                            h: Math.round(h1)
                        });
                        
                        if (urls.length > 2) {
                            const aspect2 = aspectRatios[2] || 0.8;
                            let w2 = W_canvas * 0.25;
                            let h2 = w2 / aspect2;
                            h2 = Math.min(h2, imgHeightPx * 0.65);
                            let y2 = y1 + h1 + 60;
                            obstacles.push({
                                url: urls[2],
                                caption: captions[2] || '',
                                x: Math.round(W_canvas - w2), // Bottom-right
                                y: Math.round(y2),
                                w: Math.round(w2),
                                h: Math.round(h2)
                            });
                        }
                    }
                }

                // Render absolute images onto canvas
                obstacles.forEach(obs => {
                    const imgEl = document.createElement('div');
                    imgEl.className = 'nc-absolute-image';
                    imgEl.style.position = 'absolute';
                    imgEl.style.left = `${obs.x}px`;
                    imgEl.style.top = `${obs.y}px`;
                    imgEl.style.width = `${obs.w}px`;
                    imgEl.style.height = 'auto';
                    imgEl.style.boxSizing = 'border-box';
                    imgEl.style.border = `1px solid ${data.border_color || '#000'}`;
                    imgEl.style.padding = '4px';
                    imgEl.style.background = 'var(--bg-color, #F5F1E8)';
                    imgEl.style.zIndex = '5';
                    
                    let captionHeight = 0;
                    if (obs.caption) {
                        const charsPerLine = Math.max(1, Math.floor(obs.w / 6.5));
                        const lines = Math.ceil(obs.caption.length / charsPerLine);
                        captionHeight = lines * 15;
                    }
                    const imgH = obs.h - (captionHeight ? captionHeight + 8 : 8);
                    
                    imgEl.innerHTML = `
                        <img src="${obs.url}" style="width: 100%; height: ${imgH}px; object-fit: cover; display: block;" />
                        ${obs.caption ? `<div style="font-size: 11px; font-style: italic; color: #444; margin-top: 4px; line-height: 1.3; word-wrap: break-word;">${obs.caption}</div>` : ''}
                    `;
                    canvas.appendChild(imgEl);
                });
                
                const inflatedObstacles = obstacles.map(obs => {
                    return {
                        x: obs.x - 12,
                        y: obs.y - 12,
                        w: obs.w + 24,
                        h: obs.h + 24
                    };
                });

                // Flow layout function
                const regions = [];
                for (let c = 0; c < N; c++) {
                    const L_c = c * (W_col + G);
                    const R_c = L_c + W_col;
                    
                    let intervals = [{ yStart: 0, yEnd: H_canvas, xOffset: 0, w: W_col }];
                    
                    inflatedObstacles.forEach(obs => {
                        const xOverlapStart = Math.max(L_c, obs.x);
                        const xOverlapEnd = Math.min(R_c, obs.x + obs.w);
                        if (xOverlapStart >= xOverlapEnd) return;
                        
                        const yOverlapStart = Math.max(0, obs.y);
                        const yOverlapEnd = Math.min(H_canvas, obs.y + obs.h);
                        if (yOverlapStart >= yOverlapEnd) return;
                        
                        const nextIntervals = [];
                        intervals.forEach(int => {
                            const yIntersectStart = Math.max(int.yStart, yOverlapStart);
                            const yIntersectEnd = Math.min(int.yEnd, yOverlapEnd);
                            
                            if (yIntersectStart >= yIntersectEnd) {
                                nextIntervals.push(int);
                                return;
                            }
                            
                            if (int.yStart < yIntersectStart) {
                                nextIntervals.push({
                                    yStart: int.yStart,
                                    yEnd: yIntersectStart,
                                    xOffset: int.xOffset,
                                    w: int.w
                                });
                            }
                            
                            const obsLeftRel = obs.x - L_c;
                            const obsRightRel = obs.x + obs.w - L_c;
                            
                            if (obsLeftRel <= 0) {
                                if (obsRightRel < W_col) {
                                    const wRem = W_col - obsRightRel;
                                    if (wRem >= 40) {
                                        nextIntervals.push({
                                            yStart: yIntersectStart,
                                            yEnd: yIntersectEnd,
                                            xOffset: obsRightRel,
                                            w: wRem
                                        });
                                    }
                                }
                            } else if (obsRightRel >= W_col) {
                                const wRem = obsLeftRel;
                                if (wRem >= 40) {
                                    nextIntervals.push({
                                        yStart: yIntersectStart,
                                        yEnd: yIntersectEnd,
                                        xOffset: 0,
                                        w: wRem
                                    });
                                }
                            }
                            
                            if (int.yEnd > yIntersectEnd) {
                                nextIntervals.push({
                                    yStart: yIntersectEnd,
                                    yEnd: int.yEnd,
                                    xOffset: int.xOffset,
                                    w: int.w
                                });
                            }
                        });
                        intervals = nextIntervals;
                    });
                    
                    intervals.forEach(int => {
                        const h = int.yEnd - int.yStart;
                        if (h < 24 || int.w < 40) return;
                        
                        const rBox = document.createElement('div');
                        rBox.className = 'nc-text-region-box';
                        rBox.style.position = 'absolute';
                        rBox.style.left = `${int.xOffset}px`;
                        rBox.style.top = `${int.yStart}px`;
                        rBox.style.width = `${int.w}px`;
                        rBox.style.height = `${h}px`;
                        rBox.style.boxSizing = 'border-box';
                        rBox.style.overflow = 'hidden';
                        
                        const colDiv = canvas.querySelector(`.col-${c}`) || document.createElement('div');
                        if (!canvas.contains(colDiv)) {
                            colDiv.className = `nc-column col-${c}`;
                            colDiv.style.position = 'absolute';
                            colDiv.style.left = `${L_c}px`;
                            colDiv.style.top = '0px';
                            colDiv.style.width = `${W_col}px`;
                            canvas.appendChild(colDiv);
                        }
                        colDiv.appendChild(rBox);
                        
                        regions.push({ rBox, height: h, y: int.yStart });
                    });
                }
                
                let rawSections = [];
                for (const sec of data.sections) {
                    const cleanSec = sec.replace(/\n+/g, ' ').trim();
                    if (cleanSec) rawSections.push(cleanSec);
                }
                const paragraphs = [...rawSections];
                if (paragraphs.length > 0 && data.dateline) {
                    paragraphs[0] = ((data.template_id === 'classic') ? `[${data.dateline}] — ` : `${data.dateline} — `) + paragraphs[0];
                }
                
                let pIdx = 0;
                let currentRegionIdx = 0;
                let activeRegion = regions[currentRegionIdx];
                
                while (activeRegion && pIdx < paragraphs.length) {
                    let text = paragraphs[pIdx];
                    const p = document.createElement('p');
                    p.innerText = text;
                    p.style.fontSize = `${conf.fontSize}px`;
                    p.style.lineHeight = conf.lineHeight;
                    p.style.marginBottom = `${conf.paraMargin}px`;
                    p.style.marginTop = '0';
                    p.style.textAlign = 'justify';
                    p.style.wordBreak = 'break-word';
                    p.style.overflowWrap = 'break-word';
                    activeRegion.rBox.appendChild(p);
                    
                    if (activeRegion.rBox.scrollHeight > activeRegion.height) {
                        activeRegion.rBox.removeChild(p);
                        const words = text.split(/\s+/);
                        const testP = p.cloneNode();
                        activeRegion.rBox.appendChild(testP);
                        let wIdx = 0;
                        for (; wIdx < words.length; wIdx++) {
                            testP.innerText = words.slice(0, wIdx + 1).join(' ');
                            if (activeRegion.rBox.scrollHeight > activeRegion.height) break;
                        }
                        activeRegion.rBox.removeChild(testP);
                        if (wIdx > 0) {
                            const fitP = p.cloneNode();
                            fitP.innerText = words.slice(0, wIdx).join(' ');
                            activeRegion.rBox.appendChild(fitP);
                        }
                        const rem = words.slice(wIdx).join(' ');
                        if (rem.trim().length > 0) paragraphs.splice(pIdx, 1, rem); else pIdx++;
                        currentRegionIdx++;
                        activeRegion = regions[currentRegionIdx];
                    } else pIdx++;
                }
                
                let maxY = 0;
                regions.forEach(r => {
                    if (r.rBox.lastElementChild) maxY = Math.max(maxY, r.y + r.rBox.lastElementChild.offsetTop + r.rBox.lastElementChild.offsetHeight);
                });
                obstacles.forEach(img => maxY = Math.max(maxY, img.y + img.h));
                canvas.style.height = `${Math.max(maxY, 150)}px`;
                
                window.__IMAGE_LAYOUT_LOGS__ = {
                    image_count: imgCount,
                    image_orientations: orientations.join(', '),
                    selected_layout: 'Region-Based Newspaper Page Compositor (Single-Pass)',
                    final_dimensions: obstacles.map(obs => `${obs.w}x${obs.h}px`).join(', ')
                };
            }

            async function executeLayout() {
                const dims = await Promise.all(urls.map(url => getImageDimensions(url)));
                aspectRatios = dims.map(d => (d.width && d.height) ? (d.width / d.height) : 1.0);
                await waitReady();

                const W_canvas = canvas.offsetWidth || 1060;
                const N = parseInt(data.layout_columns) || 3;
                const W_col = (W_canvas - (N - 1) * 24) / N;
                const canvasTop = canvas.getBoundingClientRect().top + window.scrollY;
                const H_avail = Math.max(1200, TARGET_MAX_HEIGHT - canvasTop - 60);
                
                let obstacleArea = 0;
                const imgHeightPx = Math.round(0.58 * W_canvas);
                if (urls.length > 0) {
                    const aspect0 = aspectRatios[0] || 1.2;
                    let w0 = W_canvas * 0.55;
                    obstacleArea += w0 * Math.min(w0 / aspect0, TARGET_MAX_HEIGHT * 0.3, imgHeightPx);
                    if (urls.length > 1) {
                        const aspect1 = aspectRatios[1] || 1.0;
                        let w1 = W_canvas * 0.30;
                        obstacleArea += w1 * Math.min(w1 / aspect1, imgHeightPx * 0.75);
                    }
                }
                
                const estFontSize = Math.sqrt(Math.max(100000, N * W_col * H_avail - obstacleArea) / (totalChars * 0.75));
                const conf = { fontSize: Math.max(16.0, Math.min(24.0, estFontSize)), lineHeight: 1.35, paraMargin: 12, imgMaxPct: 0.58, padding: 32 };

                applySinglePassLayout(conf);
                
                let st = document.getElementById('nc-layout-style');
                if (!st) { st = document.createElement('style'); st.id = 'nc-layout-style'; document.head.appendChild(st); }
                st.innerHTML = `
                    * { -webkit-font-smoothing: antialiased !important; }
                    body { margin: 0 !important; padding: 0 !important; }
                    .newspaper-container { height: auto !important; min-height: unset !important; }
                `;
                window.__LAYOUT_DONE__ = true;
            }

            setTimeout(() => { if (!window.__LAYOUT_DONE__) window.__LAYOUT_DONE__ = true; }, 10000);
            executeLayout();
        });
        </script>
