<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <title>Custom Template</title>
    <style>
        {% include 'custom/styles.css' %}
    </style>
</head>
<body>
    <div class="newspaper-container">
        <div class="inner-content">
            <div class="headline-zone">
                <h1 class="headline">{{ headline }}</h1>
            </div>
            
            <div id="compositor-canvas"></div>
        </div>
        
        <div class="footer">
            <div class="footer-logo">
                {% if logo_url %}
                    <img src="{{ logo_url }}" style="max-height: 65px; object-fit: contain;">
                {% else %}
                    {{ publication_name }}
                {% endif %}
            </div>
            <div class="footer-meta">
                {{ publication_name }}<br>
                {{ publication_date }}
            </div>
        </div>
    </div>
</body>
</html>
