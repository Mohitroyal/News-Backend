<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=Noto+Sans:wght@400;700&display=swap');

        body {
            background-color: #fdfbf7;
            color: #1a1a1a;
            font-family: 'Old Standard TT', serif;
            margin: 0;
            padding: 40px;
            width: 1120px;
        }

        .newspaper-container {
            border: 1px solid #ddd;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .masthead {
            font-family: 'Playfair Display', serif;
            font-size: 60px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -1px;
            text-align: center;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            padding: 3px 0;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            line-height: 1.1;
            margin: 0;
            text-align: left;
        }

        .subheadline {
            font-size: 17px;
            font-style: italic;
            color: #555;
            margin: 0;
        }

        .paragraph {
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 17px;
        }

        .byline {
            font-weight: bold;
            text-transform: uppercase;
            margin: 0;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="newspaper-container">
        <!-- Fixed Header Area: 140px -->
        <div class="header-block" style="height: 140px; overflow: hidden; border-bottom: 4px double #333; margin-bottom: 10px; box-sizing: border-box;">
            <header style="margin: 0; padding: 0; border: none;">
                <h1 class="masthead">THE DAILY CHRONICLE</h1>
                <div class="meta-info" style="margin-top: 5px;">
                    <span>VOL. CLXII... No. 56,234</span>
                    <span>{{ dateline }}</span>
                    <span>PRICE TWO CENTS</span>
                </div>
            </header>
        </div>

        <!-- Fixed Headline Area: 120px -->
        <div class="headline-block" style="height: 120px; overflow: hidden; margin-bottom: 10px; box-sizing: border-box;">
            <h2 class="headline" style="margin: 0 0 5px 0; font-size: 68px; font-weight: bold; line-height: 1.1;">{{ headline }}</h2>
            <p class="subheadline" style="margin: 0 0 5px 0; font-size: 16px;">{{ subheadline }}</p>
            <div class="byline" style="margin: 0;">By {{ byline }}</div>
        </div>

        <div id="compositor-canvas"></div>
    </div>
</body>
</html>
