<!DOCTYPE html>
<html lang="{{ language }}">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=Noto+Sans:wght@400;700&display=swap');

        body {
            background-color: #fdfbf7;
            color: #1a1a1a;
            font-family: 'Old Standard TT', serif;
            margin: 0;
            padding: 40px;
            width: 1120px; /* Standard broadsheet ratio */
        }

        .newspaper-container {
            border: 1px solid #ddd;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            border-bottom: 4px double #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .masthead {
            font-family: 'Playfair Display', serif;
            font-size: 80px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -2px;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            padding: 5px 0;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            line-height: 1.1;
            margin: 20px 0 10px 0;
            text-align: left;
        }

        .subheadline {
            font-size: 20px;
            font-style: italic;
            color: #555;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            text-align: justify;
        }

        .paragraph {
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 17px;
        }

        .paragraph:first-of-type::first-letter {
            float: left;
            font-size: 60px;
            line-height: 1;
            padding-right: 8px;
            font-weight: bold;
        }

        .byline {
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .dateline {
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="newspaper-container">
        <header>
            <h1 class="masthead">THE DAILY CHRONICLE</h1>
            <div class="meta-info">
                <span>VOL. CLXII... No. 56,234</span>
                <span>{{ dateline }}</span>
                <span>PRICE TWO CENTS</span>
            </div>
        </header>

        <h2 class="headline">{{ headline }}</h2>
        <p class="subheadline">{{ subheadline }}</p>

        <div class="byline">By {{ byline }}</div>

        <div id="compositor-canvas"></div>
    </div>
</body>
</html>
