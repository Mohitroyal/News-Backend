<html lang="te">
<head>
    <meta charset="UTF-8">
    <title>Intersection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Merriweather:ital,wght@0,700;0,900;1,700&family=Noto+Serif+Devanagari:wght@400;700&family=Noto+Serif+Telugu:wght@400;700&family=Noto+Serif+Kannada:wght@400;700&family=Noto+Serif+Tamil:wght@400;700&family=Noto+Serif+Malayalam:wght@400;700&display=swap');

/* Color Theme: Bold Crimson Red, Stark Black, Ash White Paper Background */
:root {
    --bg-color: #f5f5f3;
    --paper-color: #ffffff;
    --text-color: #0b0b0b;
    --accent-color: #a30000; /* Bold Red */
    --border-color: #111111;
    --column-gap: 26px;
}

body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Lora', 'Noto Serif Telugu', 'Noto Serif Telugu', 'Noto Sans Telugu', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', serif;
    margin: 0;
    padding: 30px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

/* Multilingual Font Families */
html[lang="hi"] body, html[lang="hi"] .paragraph, html[lang="hi"] .headline {
    font-family: 'Noto Serif Devanagari', serif;
}
html[lang="te"] body, html[lang="te"] .paragraph, html[lang="te"] .headline {
    font-family: 'Noto Serif Telugu', serif;
}
html[lang="kn"] body, html[lang="kn"] .paragraph, html[lang="kn"] .headline {
    font-family: 'Noto Serif Kannada', serif;
}
html[lang="ta"] body, html[lang="ta"] .paragraph, html[lang="ta"] .headline {
    font-family: 'Noto Serif Tamil', serif;
}
html[lang="ml"] body, html[lang="ml"] .paragraph, html[lang="ml"] .headline {
    font-family: 'Noto Serif Malayalam', serif;
}

.newspaper-container {
    width: 1060px; /* Precise broadsheet width */
    height: auto;
    min-height: 500px;
    background: var(--paper-color);
    border: 2px solid var(--border-color);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    padding: 40px;
    box-sizing: border-box;
    position: relative;
    display: flex;
    flex-direction: column;
}

/* HEADER SECTION */
.header-section {
    width: 100%;
    margin-bottom: 12px;
    text-align: center;
}

.logo-container {
    width: 100%;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo-container svg,
.logo-container img {
    max-height: 80px;
    width: auto;
    max-width: 100%;
    display: block;
    margin: 0 auto;
}

/* NEWSPAPER META SECTION */
.meta-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 2px solid var(--border-color);
    border-bottom: 2px solid var(--border-color);
    padding: 5px 10px;
    font-size: 13.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 8px;
    color: #111111;
}

.meta-item {
    display: flex;
    align-items: center;
}

/* HEADLINE SECTION */
.headline-section {
    margin: 22px 0 14px 0 !important;
    text-align: center !important;
    border: 2px solid #D60000 !important;
    border-left: 2px solid #D60000 !important;
    background-color: #FFF8DC !important;
    padding: 15px !important;
}

.headline {
    font-family: 'Merriweather', 'Noto Serif Telugu', 'Noto Serif Telugu', 'Noto Sans Telugu', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', serif;
    font-size: 52px;
    font-weight: 900;
    line-height: 1.15;
    color: var(--text-color);
    margin: 0;
    letter-spacing: -0.5px;
}

/* SUBHEADLINE SECTION */
.subheadline-section {
    border-bottom: 1px solid #dcdcd8;
    padding-bottom: 15px;
    margin-bottom: 22px;
    text-align: left;
}

.subheadline {
    font-family: 'Lora', 'Noto Serif Telugu', 'Noto Serif Telugu', 'Noto Sans Telugu', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', 'Noto Serif Devanagari', 'Noto Sans Devanagari', 'Noto Serif Kannada', 'Noto Sans Kannada', 'Noto Serif Malayalam', 'Noto Sans Malayalam', 'Noto Serif Tamil', 'Noto Sans Tamil', 'Noto Serif Bengali', 'Noto Sans Bengali', 'Noto Serif Gujarati', 'Noto Sans Gujarati', 'Noto Serif Gurmukhi', 'Noto Sans Gurmukhi', 'Noto Serif Oriya', 'Noto Sans Oriya', serif;
    font-size: 19.5px;
    font-weight: 600;
    color: #444444;
    margin: 0;
    line-height: 1.45;
}

/* CONTENT CONTAINER */
.newspaper-body {
    display: flex;
    flex-direction: column;
    gap: 20px;
    flex-grow: 1; /* Make the body grow to push footer to the bottom */
}

/* IMAGE SECTION */
.image-section {
    width: 100%;
    margin-bottom: 12px;
    border: 1px solid #c8c8c4;
    padding: 4px;
    box-sizing: border-box;
}

.article-image {
    display: block;
    margin: 0 auto;
    width: 100%;
    max-height: 450px;
    object-fit: contain;
    filter: grayscale(20%) contrast(110%);
}

.image-caption {
    font-size: 13px;
    font-weight: 600;
    margin-top: 8px;
    color: #555;
    text-align: center;
    line-height: 1.4;
    border-top: 1px solid #eee;
    padding-top: 4px;
}

/* ARTICLE CONTENT SECTION - MULTI-COLUMN */
.article-content {
    columns: 3;
    column-gap: var(--column-gap);
    column-rule: 1px solid #dcdcd8;
    text-align: justify;
    font-size: 15px;
    line-height: 1.65;
    color: #1a1a1a;
}

.paragraph {
    margin-top: 0;
    margin-bottom: 15px;
    text-indent: 20px;
}

.paragraph:first-of-type {
    text-indent: 0;
}


.byline-section {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
    color: var(--accent-color);
    border-bottom: 1px solid #dcdcd8;
    padding-bottom: 4px;
}

/* FOOTER SECTION */
.footer-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    word-wrap: break-word;
    border-top: 2px solid var(--border-color);
    padding-top: 12px;
    margin-top: auto; /* Push the footer to the bottom of the container */
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #444;
    font-weight: bold;
}

                .headline, .subheadline, .subtitle, h1, h2, h3, .article-content p, .paragraph, .dateline, .image-caption {
                    font-family: 'Noto Serif Telugu', 'Noto Sans Telugu', 'Playfair Display', 'Merriweather', serif !important;
                }
            </style>

            .headline {
                color: #D60000 !important;
                font-weight: 900 !important;
                text-shadow: 0 1px 0 rgba(0,0,0,0.08) !important;
            }
            .headline-section {
                border-left-color: #D60000 !important;
            }

                { fontSize: 11.5, lineHeight: 1.18, paraMargin: 4,  imgMaxPct: 0.36, padding: 12 },
                { fontSize: 11.0, lineHeight: 1.15, paraMargin: 3,  imgMaxPct: 0.34, padding: 10 },
                { fontSize: 10.5, lineHeight: 1.15, paraMargin: 3,  imgMaxPct: 0.32, padding: 10 },
                { fontSize: 10.0, lineHeight: 1.12, paraMargin: 2,  imgMaxPct: 0.30, padding: 8 },
                { fontSize:  9.0, lineHeight: 1.10, paraMargin: 2,  imgMaxPct: 0.28, padding: 6 }
            ];

            // waitReady utility with timeout
            async function waitReady() {
                const WAIT_TIMEOUT = 8000;
                try {
                    await Promise.race([
                        document.fonts.ready,
                        new Promise(r => setTimeout(r, WAIT_TIMEOUT))
                    ]);
                } catch(e) {}

                const imgPromises = Array.from(document.images).map(img => {
                    if (img.complete) return Promise.resolve();
                    return Promise.race([
                        new Promise(r => {
                            img.addEventListener('load',  r, { once: true });
                            img.addEventListener('error', r, { once: true });
                        }),
                        new Promise(r => setTimeout(r, WAIT_TIMEOUT))
                    ]);
                });
                await Promise.all(imgPromises);
            }

            const urls = data.image_urls || [];
            const captions = data.image_captions || [];
            const imgCount = urls.length;
            
            let aspectRatios = [];
            let orientations = [];

            // getImageDimensions utility
            async function getImageDimensions(url) {
                const existingImg = Array.from(document.images).find(img => img.src === url || img.getAttribute('src') === url);
                if (existingImg && existingImg.naturalWidth && existingImg.naturalHeight) {
                    return { width: existingImg.naturalWidth, height: existingImg.naturalHeight };
                }
                return Promise.race([
                    new Promise((resolve) => {
                        const img = new Image();
                        img.onload  = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
                        img.onerror = () => resolve({ width: 800, height: 600 });
                        img.src = url;
                    }),
                    new Promise(resolve => setTimeout(() => {
                        resolve({ width: 800, height: 600 });
                    }, 8000))
                ]);
            }

            // Ensure we have a compositor-canvas element
            let canvas = document.getElementById('compositor-canvas');
            if (!canvas) {
                canvas = document.createElement('div');
                canvas.id = 'compositor-canvas';
                container.appendChild(canvas);
            }
            canvas.style.position = 'relative';
            canvas.style.width = '100%';
            canvas.style.boxSizing = 'border-box';

            function applyConfig(conf) {
                // Clear the compositor canvas
                canvas.innerHTML = '';
                
                // Get canvas width
                const W_canvas = canvas.offsetWidth || 1060;
                
                // Calculate columns
                const N = parseInt(data.layout_columns) || 3;
                const G = 24; // Column gap in pixels
                const W_col = (W_canvas - (N - 1) * G) / N;
                
                // Get canvas boundaries relative to target maximum page height
                const canvasTop = canvas.getBoundingClientRect().top + window.scrollY;
                const H_canvas = TARGET_MAX_HEIGHT - canvasTop - 60; // 60px padding/footer margin
                
                // Calculate image dimensions and create absolute obstacles
                const obstacles = [];
                const imgHeightPx = Math.round(conf.imgMaxPct * W_canvas);
                
                if (urls.length > 0) {
                    // Hero Image: max width 55% of page width, max height 30% of page height
                    const aspect0 = aspectRatios[0] || 1.2;
                    let w0 = W_canvas * 0.55;
                    let h0 = w0 / aspect0;
                    h0 = Math.min(h0, TARGET_MAX_HEIGHT * 0.3, imgHeightPx);
                    if (w0 > W_canvas * 0.55) {
                        w0 = W_canvas * 0.55;
                        h0 = w0 / aspect0;
                    }
                    // Reduce Hero image height by 20% (and adjust width to maintain aspect ratio)
                    h0 = h0 * 0.8;
                    w0 = h0 * aspect0;
                    obstacles.push({
                        url: urls[0],
                        caption: captions[0] || '',
                        x: Math.round(W_canvas - w0), // Align top-right
                        y: 0,
                        w: Math.round(w0),
                        h: Math.round(h0)
                    });
                    
                    if (urls.length > 1) {
                        // Secondary Image: max width 30% of page width
                        const aspect1 = aspectRatios[1] || 1.0;
                        let w1 = W_canvas * 0.30;
                        let h1 = w1 / aspect1;
                        h1 = Math.min(h1, imgHeightPx * 0.75);
                        let y1 = h0 + 60; // Spacing below Hero
                        obstacles.push({
                            url: urls[1],
                            caption: captions[1] || '',
                            x: 0, // Middle-left
                            y: Math.round(y1),
                            w: Math.round(w1),
                            h: Math.round(h1)
                        });
                        
                        if (urls.length > 2) {
                            // Portrait Image: max width 25% of page width, size unchanged
                            const aspect2 = aspectRatios[2] || 0.8;
                            let w2 = W_canvas * 0.25;
                            let h2 = w2 / aspect2;
                            h2 = Math.min(h2, imgHeightPx * 0.65);
                            let y2 = y1 + h1 + 60;
                            obstacles.push({
                                url: urls[2],
                                caption: captions[2] || '',
                                x: Math.round(W_canvas - w2), // Bottom-right
                                y: Math.round(y2),
                                w: Math.round(w2),
                                h: Math.round(h2)
                            });
                        }
                    }
                }
                
                // Render absolute images onto canvas
                obstacles.forEach(obs => {
                    const imgEl = document.createElement('div');
                    imgEl.className = 'nc-absolute-image';
                    imgEl.style.position = 'absolute';
                    imgEl.style.left = `${obs.x}px`;
                    imgEl.style.top = `${obs.y}px`;
                    imgEl.style.width = `${obs.w}px`;
                    imgEl.style.height = `${obs.h}px`;
                    imgEl.style.boxSizing = 'border-box';
                    imgEl.style.border = `1px solid ${data.border_color || '#000'}`;
                    imgEl.style.padding = '4px';
                    imgEl.style.background = '#fff';
                    imgEl.style.zIndex = '5';
                    
                    const imgH = obs.h - (obs.caption ? 24 : 8);
                    imgEl.innerHTML = `
                        <img src="${obs.url}" style="width: 100%; height: ${imgH}px; object-fit: cover; display: block;" />
                        ${obs.caption ? `<div style="font-size: 11px; font-style: italic; color: #444; margin-top: 4px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; height: 14px; line-height: 14px;">${obs.caption}</div>` : ''}
                    `;
                    canvas.appendChild(imgEl);
                });
                
                // Define inflated obstacles to carve out margins around text regions (12px cushion)
                const inflatedObstacles = obstacles.map(obs => {
                    return {
                        x: obs.x - 12,
                        y: obs.y - 12,
                        w: obs.w + 24,
                        h: obs.h + 24
                    };
                });
                
                // Generate rectangular text regions in each column using vertical interval-splitting
                const colDivs = [];
                const regions = [];
                
                for (let c = 0; c < N; c++) {
                    const L_c = c * (W_col + G);
                    const R_c = L_c + W_col;
                    
                    // Start with a single full-height interval
                    let intervals = [{ yStart: 0, yEnd: H_canvas, xOffset: 0, w: W_col }];
                    
                    // Split intervals sequentially by intersecting inflated obstacles
                    inflatedObstacles.forEach(obs => {
                        const xOverlapStart = Math.max(L_c, obs.x);
                        const xOverlapEnd = Math.min(R_c, obs.x + obs.w);
                        if (xOverlapStart >= xOverlapEnd) return; // No horizontal overlap
                        
                        const yOverlapStart = Math.max(0, obs.y);
                        const yOverlapEnd = Math.min(H_canvas, obs.y + obs.h);
                        if (yOverlapStart >= yOverlapEnd) return;
                        
                        const nextIntervals = [];
                        intervals.forEach(int => {
                            const yIntersectStart = Math.max(int.yStart, yOverlapStart);
                            const yIntersectEnd = Math.min(int.yEnd, yOverlapEnd);
                            
                            if (yIntersectStart >= yIntersectEnd) {
                                // No vertical intersection with this interval, keep it
                                nextIntervals.push(int);
                                return;
                            }
                            
                            // 1. Above split
                            if (yIntersectStart > int.yStart) {
                                nextIntervals.push({
                                    yStart: int.yStart,
                                    yEnd: yIntersectStart,
                                    xOffset: int.xOffset,
                                    w: int.w
                                });
                            }
                            
                            // 2. Intersecting split (side channel text regions next to image)
                            const obsLeftRel = obs.x - L_c;
                            const obsRightRel = (obs.x + obs.w) - L_c;
                            
                            if (obsLeftRel <= 0) {
                                // Image covers the left, text channel on the right
                                const wRem = W_col - obsRightRel;
                                if (wRem >= 80) {
                                    nextIntervals.push({
                                        yStart: yIntersectStart,
                                        yEnd: yIntersectEnd,
                                        xOffset: obsRightRel,
                                        w: wRem
                                    });
                                }
                            } else if (obsRightRel >= W_col) {
                                // Image covers the right, text channel on the left
                                const wRem = obsLeftRel;
                                if (wRem >= 80) {
                                    nextIntervals.push({
                                        yStart: yIntersectStart,
                                        yEnd: yIntersectEnd,
                                        xOffset: 0,
                                        w: wRem
                                    });
                                }
                            } else {
                                // Image is centered/in-between
                                const wLeft = obsLeftRel;
                                const wRight = W_col - obsRightRel;
                                if (wLeft >= wRight && wLeft >= 80) {
                                    nextIntervals.push({
                                        yStart: yIntersectStart,
                                        yEnd: yIntersectEnd,
                                        xOffset: 0,
                                        w: wLeft
                                    });
                                } else if (wRight >= 80) {
                                    nextIntervals.push({
                                        yStart: yIntersectStart,
                                        yEnd: yIntersectEnd,
                                        xOffset: obsRightRel,
                                        w: wRight
                                    });
                                }
                            }
                            
                            // 3. Below split
                            if (int.yEnd > yIntersectEnd) {
                                nextIntervals.push({
                                    yStart: yIntersectEnd,
                                    yEnd: int.yEnd,
                                    xOffset: int.xOffset,
                                    w: int.w
                                });
                            }
                        });
                        intervals = nextIntervals;
                    });
                    
                    // Create column absolute container
                    const colDiv = document.createElement('div');
                    colDiv.className = `nc-column col-${c}`;
                    colDiv.style.position = 'absolute';
                    colDiv.style.left = `${L_c}px`;
                    colDiv.style.top = '0px';
                    colDiv.style.width = `${W_col}px`;
                    colDiv.style.boxSizing = 'border-box';
                    canvas.appendChild(colDiv);
                    colDivs.push(colDiv);
                    
                    // Render regions as absolute boxes inside column
                    intervals.forEach(int => {
                        const h = int.yEnd - int.yStart;
                        if (h < 24 || int.w < 80) return; // filter out tiny/useless slices
                        
                        const rBox = document.createElement('div');
                        rBox.className = 'nc-text-region-box';
                        rBox.style.position = 'absolute';
                        rBox.style.left = `${int.xOffset}px`;
                        rBox.style.top = `${int.yStart}px`;
                        rBox.style.width = `${int.w}px`;
                        rBox.style.height = `${h}px`;
                        rBox.style.boxSizing = 'border-box';
                        rBox.style.overflow = 'hidden';
                        
                        colDiv.appendChild(rBox);
                        
                        regions.push({
                            colIndex: c,
                            div: colDiv,
                            rBox: rBox,
                            height: h
                        });
                    });
                }
                
                // Flow text through regions sequentially
                const paragraphs = [...data.sections];
                if (paragraphs.length > 0 && data.dateline) {
                    const prefix = (data.template_id === 'classic') ? `[${data.dateline}] — ` : `${data.dateline} — `;
                    paragraphs[0] = prefix + paragraphs[0];
                }
                
                let pIdx = 0;
                let currentRegionIdx = 0;
                let activeRegion = regions[currentRegionIdx];
                let fits = true;
                
                while (activeRegion) {
                    if (pIdx >= paragraphs.length) {
                        break;
                    }
                    
                    let text = paragraphs[pIdx];
                    
                    const p = document.createElement('p');
                    p.innerText = text;
                    p.style.fontSize = `${conf.fontSize}px`;
                    p.style.lineHeight = conf.lineHeight;
                    p.style.marginBottom = `${conf.paraMargin}px`;
                    p.style.marginTop = '0';
                    p.style.textAlign = 'justify';
                    p.style.wordBreak = 'break-word';
                    p.style.overflowWrap = 'break-word';
                    p.style.hyphens = 'auto';
                    
                    activeRegion.rBox.appendChild(p);
                    
                    if (activeRegion.rBox.scrollHeight > activeRegion.height) {
                        activeRegion.rBox.removeChild(p);
                        
                        const words = text.split(/\s+/);
                        const testP = document.createElement('p');
                        testP.style.fontSize = `${conf.fontSize}px`;
                        testP.style.lineHeight = conf.lineHeight;
                        testP.style.marginBottom = `${conf.paraMargin}px`;
                        testP.style.marginTop = '0';
                        testP.style.textAlign = 'justify';
                        testP.style.wordBreak = 'break-word';
                        testP.style.overflowWrap = 'break-word';
                        testP.style.hyphens = 'auto';
                        activeRegion.rBox.appendChild(testP);
                        
                        let wIdx = 0;
                        for (; wIdx < words.length; wIdx++) {
                            testP.innerText = words.slice(0, wIdx + 1).join(' ');
                            if (activeRegion.rBox.scrollHeight > activeRegion.height) {
                                break;
                            }
                        }
                        activeRegion.rBox.removeChild(testP);
                        
                        if (wIdx > 0) {
                            const fitP = document.createElement('p');
                            fitP.innerText = words.slice(0, wIdx).join(' ');
                            fitP.style.fontSize = `${conf.fontSize}px`;
                            fitP.style.lineHeight = conf.lineHeight;
                            fitP.style.marginBottom = `${conf.paraMargin}px`;
                            fitP.style.marginTop = '0';
                            fitP.style.textAlign = 'justify';
                            fitP.style.wordBreak = 'break-word';
                            fitP.style.overflowWrap = 'break-word';
                            fitP.style.hyphens = 'auto';
                            activeRegion.rBox.appendChild(fitP);
                        }
                        
                        const remainingText = words.slice(wIdx).join(' ');
                        if (remainingText.trim().length > 0) {
                            paragraphs.splice(pIdx, 1, remainingText);
                        } else {
                            pIdx++;
                        }
                        
                        currentRegionIdx++;
                        activeRegion = regions[currentRegionIdx];
                        
                        if (!activeRegion) {
                            if (pIdx < paragraphs.length) {
                                fits = false;
                            }
                            break;
                        }
                    } else {
                        pIdx++;
                    }
                }
                
                if (fits) {
                    canvas.style.height = `${H_canvas}px`;
                }
                
                window.__IMAGE_LAYOUT_LOGS__ = {
                    image_count: imgCount,
                    image_orientations: orientations.join(', '),
                    selected_layout: 'Region-Based Newspaper Page Compositor',
                    final_dimensions: obstacles.map(obs => `${obs.w}x${obs.h}px`).join(', ')
                };
                
                return fits;
            }

            async function executeLayout() {
                console.log('LAYOUT START');
                const dims = await Promise.all(urls.map(url => getImageDimensions(url)));
                aspectRatios = dims.map(d => (d.width && d.height) ? (d.width / d.height) : 1.0);
                orientations = dims.map(d => {
                    if (!d.width || !d.height) return 'Square';
                    if (d.height > d.width) return 'Portrait';
                    if (d.width > d.height) return 'Landscape';
                    return 'Square';
                });

                await waitReady();

                container.style.height    = 'auto';
                container.style.minHeight = 'unset';
                container.style.overflow  = 'visible';

                let chosenConf = configs[0];
                let fits = false;

                for (let i = 0; i < configs.length; i++) {
                    const conf = configs[i];
                    container.style.padding = conf.padding + 'px';
                    
                    const innerBorder = container.querySelector('.inner-border');
                    if (innerBorder) {
                        innerBorder.style.padding = Math.round(conf.padding * 0.8) + 'px';
                    }

                    const headline = container.querySelector('.headline');
                    if (headline) {
                        let hlSize = Math.min(54, Math.round(conf.fontSize * 3.4));
                        headline.style.fontSize = hlSize + 'px';
                        headline.style.lineHeight = '1.1';
                        let count = 0;
                        while (hlSize > 20 && count < 20) {
                            const lh = parseInt(window.getComputedStyle(headline).lineHeight) || hlSize * 1.1;
                            const lines = Math.round(headline.offsetHeight / lh);
                            if (lines <= 2) {
                                break;
                            }
                            hlSize -= 2;
                            headline.style.fontSize = hlSize + 'px';
                            count++;
                        }
                    }

                    const subheadline = container.querySelector('.subheadline, .subtitle');
                    if (subheadline) {
                        let subSize = Math.min(22, Math.round(conf.fontSize * 1.4));
                        subheadline.style.fontSize = subSize + 'px';
                        subheadline.style.lineHeight = '1.3';
                        let count = 0;
                        while (subSize > 12 && count < 10) {
                            const lh = parseInt(window.getComputedStyle(subheadline).lineHeight) || subSize * 1.3;
                            const lines = Math.round(subheadline.offsetHeight / lh);
                            if (lines <= 2) {
                                break;
                            }
                            subSize -= 1.5;
                            subheadline.style.fontSize = subSize + 'px';
                            count++;
                        }
                    }

                    let dcStyle = document.getElementById('nc-dropcap-style');
                    if (!dcStyle) {
                        dcStyle = document.createElement('style');
                        dcStyle.id = 'nc-dropcap-style';
                        document.head.appendChild(dcStyle);
                    }
                    dcStyle.innerHTML = '';

                    fits = applyConfig(conf);
                    chosenConf = conf;

                    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

                    if (fits && container.scrollHeight <= TARGET_MAX_HEIGHT) {
                        break;
                    }
                }

                await waitReady();

                let st = document.getElementById('nc-layout-style');
                if (!st) { st = document.createElement('style'); st.id = 'nc-layout-style'; document.head.appendChild(st); }
                st.innerHTML = `
                    * { -webkit-font-smoothing: antialiased !important; text-rendering: optimizeLegibility !important; }
                    body { margin: 0 !important; padding: 20px !important; display: flex !important; justify-content: center !important; align-items: flex-start !important; }
                    .newspaper-container { height: auto !important; min-height: unset !important; overflow: visible !important; }
                    @media print {
                        @page { size: auto; margin: 0; }
                        body { padding: 0 !important; background: #fff !important; }
                        .newspaper-container { border: none !important; box-shadow: none !important; width: 100% !important; height: auto !important; }
                        * { page-break-inside: avoid !important; page-break-after: avoid !important; page-break-before: avoid !important; }
                    }
                    .headline { color: #D60000 !important; font-weight: 900 !important; text-shadow: 0 1px 0 rgba(0,0,0,0.08) !important; }
                    .headline-section { border-left-color: #D60000 !important; }
                `;

                console.log('LAYOUT COMPLETE');
                window.__LAYOUT_DONE__ = true;
            }

            setTimeout(function() {
                if (!window.__LAYOUT_DONE__) {
                    console.log('FORCED LAYOUT COMPLETE: 10s failsafe triggered — setting __LAYOUT_DONE__');
                    window.__LAYOUT_DONE__ = true;
                }
            }, 10000);

            (async () => {
                try {
                    await executeLayout();
                } catch(err) {
                    console.error('[LAYOUT FATAL ERROR]', err && err.message ? err.message : String(err));
                    if (!window.__LAYOUT_DONE__) {
                        window.__LAYOUT_DONE__ = true;
                    }
                }
            })();
        });
        </script>
        </body>
</html>
